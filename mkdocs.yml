# MkDocs Configuration for DQX

# Project information
site_name: DQX - Data Quality Excellence
site_description: Transform data validation into mathematical expressions. Find issues before they find you.
site_author: Nam Pham
site_url: https://dqx.readthedocs.io

# Repository
repo_name: dqx
repo_url: https://github.com/nampham2/dqx
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 Nam Pham

# Theme configuration
theme:
  name: material
  language: en

  # Color palette
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Font configuration
  font:
    text: Roboto
    code: Roboto Mono

  # Logo and favicon
  logo: assets/logo.png  # Add your logo
  favicon: assets/favicon.png

  # Features
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer

    # Table of contents
    - toc.follow
    - toc.integrate

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Code blocks
    - content.code.copy
    - content.code.annotate
    - content.code.select

    # Content
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips

    # Actions
    - content.action.edit
    - content.action.view

    # Announce
    - announce.dismiss

# Navigation
nav:
  - Home: index.md
  - Design:
      - Contracts:
          - Overview: design/contracts/index.md
          - Check Types: design/contracts/checks.md
          - SLA Specification: design/contracts/sla.md
          - Type System: design/contracts/types.md
      - Profiles: design/profiles.md

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.snippets:
      check_paths: true

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Social links
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nampham2/dqx
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/dqx/
    - icon: fontawesome/solid/book
      link: https://dqx.readthedocs.io

  # Consent
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

# Watch for changes
watch:
  - src/dqx
  - docs
